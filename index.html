<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chember</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Full-page layout */
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f3e8dbff; 
      color: #9a6633ff;
    }

    .container {
      text-align: center;
    }

    .svg-wrapper {
        display: flex;
        justify-content: center;
    }

    .contact {
      font-size: 1rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="svg-wrapper">
        <img src="media/chember_full.svg" alt="logo" style="width:500px; height:auto; margin:auto">
    </div>

    <p class="contact">
      learnmore@chember.net
    </p>
  </div>
</body>
</html>
